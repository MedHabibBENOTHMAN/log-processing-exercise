image: python:3.11-slim

variables:
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

cache:
  key:
    files:
      - pyproject.toml
  paths:
    - .uv-cache/
    - .venv/

before_script:
  - pip install --quiet uv
  - uv sync --group dev

stages:
  - check
  - test

lint:
  stage: check
  script:
    - uv run ruff check .
    - uv run ruff format --check .

typecheck:
  stage: check
  script:
    - uv run mypy .

test:
  stage: test
  script:
    - uv run pytest -v
